<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BitVerse - A cyberpunk quantum civilization builder game. Build your digital empire across sectors, manage resources, and explore multiple timelines.">
  <meta name="keywords" content="Flutter, game, cyberpunk, quantum, civilization, builder, web game">
  <meta name="author" content="Govind Tank">
  
  <!-- Open Graph / Social Media -->
  <meta property="og:title" content="BitVerse - Quantum Civilization Builder">
  <meta property="og:description" content="A cyberpunk-themed quantum civilization builder game">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://govindtank.github.io/bitverse/">
  
  <!-- Theme Color -->
  <meta name="theme-color" content="#0A0A0F">
  <meta name="msapplication-TileColor" content="#0A0A0F">
  
  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BitVerse">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="shortcut icon" type="image/png" href="favicon.png"/>

  <title>BitVerse - Quantum Civilization Builder</title>
  <link rel="manifest" href="manifest.json">
  
  <style>
    /* Loading screen styles */
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #0A0A0F 0%, #1A1A2E 50%, #0A0A0F 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    
    .loading-container {
      text-align: center;
    }
    
    .loading-logo {
      width: 80px;
      height: 80px;
      border: 3px solid #00FFFF;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.3), 0 0 40px rgba(0, 255, 255, 0.1);
      animation: pulse 2s ease-in-out infinite;
    }
    
    .loading-logo svg {
      width: 48px;
      height: 48px;
      fill: #00FFFF;
    }
    
    .loading-title {
      color: #00FFFF;
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 8px;
      margin-bottom: 8px;
      text-shadow: 0 0 10px #00FFFF, 0 0 20px #00FFFF;
    }
    
    .loading-subtitle {
      color: #8888AA;
      font-size: 12px;
      letter-spacing: 4px;
      margin-bottom: 32px;
    }
    
    .loading-bar {
      width: 200px;
      height: 4px;
      background: #1A1A2E;
      border-radius: 2px;
      overflow: hidden;
      margin: 0 auto;
    }
    
    .loading-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #00FFFF, #FF00FF);
      border-radius: 2px;
      animation: loading 1.5s ease-in-out infinite;
    }
    
    .loading-text {
      color: #8888AA;
      font-size: 10px;
      letter-spacing: 2px;
      margin-top: 16px;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }
    
    @keyframes loading {
      0% { width: 0%; margin-left: 0%; }
      50% { width: 70%; margin-left: 15%; }
      100% { width: 0%; margin-left: 100%; }
    }
  </style>
</head>
<body>
  <div class="loading-container" id="loading">
    <div class="loading-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
      </svg>
    </div>
    <div class="loading-title">BITVERSE</div>
    <div class="loading-subtitle">QUANTUM CIVILIZATION BUILDER</div>
    <div class="loading-bar">
      <div class="loading-bar-fill"></div>
    </div>
    <div class="loading-text">INITIALIZING QUANTUM ENGINE...</div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      document.getElementById('loading').style.display = 'none';
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
