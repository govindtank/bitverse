name: bitverse
description: BitVerse - Quantum Civilization Builder MVP with cyberpunk aesthetic

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  provider: ^6.1.1
  
  # Database (IndexedDB for web, SQLite for mobile/desktop)
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.2
  workmanager: ^0.5.2
  
  # PWA & Web Features
  url_launcher: ^6.2.4
  shared_preferences_web: ^2.2.2
  
  # UI Components & Theming
  flutter_slidable: ^3.0.1
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  font_awesome_flutter: ^10.6.0
  
  # Animations
  flutter_animate: ^4.3.0
  
  # Charts & Data Visualization
  fl_chart: ^0.65.0
  
  # Audio
  audioplayers: ^5.2.1
  
  # Notifications (PWA)
  url_strategy: ^0.2.0
  
  # Utilities
  intl: ^0.18.1
  uuid: ^4.3.3
  rxdart: ^0.27.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.12

flutter:
  uses-material-design: true
  
  assets:
    - assets/
